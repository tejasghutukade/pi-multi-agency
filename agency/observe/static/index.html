<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agency ops observer</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="top">
    <h1>Agency ops</h1>
    <p id="meta" class="meta">Loading…</p>
  </header>
  <p id="error" class="error" hidden></p>
  <main class="grid">
    <section aria-labelledby="roster-h">
      <h2 id="roster-h">Roster <span class="sub">process truth</span></h2>
      <div id="roster" class="panel">Loading…</div>
    </section>
    <section aria-labelledby="bus-h">
      <h2 id="bus-h">Bus <span class="sub">task truth</span></h2>
      <div id="bus" class="panel">Loading…</div>
    </section>
    <section aria-labelledby="timeline-h" class="full">
      <h2 id="timeline-h">Timeline <span class="sub">emit feed</span></h2>
      <div id="timeline" class="panel">Loading…</div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
